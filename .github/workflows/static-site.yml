name: Static Site CI
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - master
permissions:
  contents: write
  issues: write
  pages: write
jobs:
  static-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
      - name: Copy assets to site output
        run: |
          ls -la site/__sapper__/export/ || true
          mkdir -p site/__sapper__/export/assets
          cp -rv assets/* site/__sapper__/export/assets/
          ls -la site/__sapper__/export/assets/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site/__sapper__/export
          cname: status.storyly.io
