name: Static Site CI
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - master
permissions:
  contents: write
  issues: write
  pages: write
jobs:
  static-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
      - name: Debug - find export output
        run: |
          echo "=== Root ==="
          ls -la
          echo "=== status-page ==="
          ls -la status-page/ 2>/dev/null || echo "no status-page dir"
          echo "=== status-page/__sapper__ ==="
          ls -la status-page/__sapper__/ 2>/dev/null || echo "no __sapper__ dir"
          echo "=== status-page/__sapper__/export ==="
          ls -la status-page/__sapper__/export/ 2>/dev/null || echo "no export dir"
          echo "=== find all index.html ==="
          find . -name "index.html" -not -path "*/node_modules/*" 2>/dev/null | head -20
          echo "=== find all __sapper__ ==="
          find . -name "__sapper__" -type d 2>/dev/null | head -10
